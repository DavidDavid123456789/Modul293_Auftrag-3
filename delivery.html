<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delivery - Dave's Burger</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="navbar">
      <div class="logo"><a href="index.html">Dave's Burger</a></div>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="delivery.html">Delivery</a>
        <a href="about.html">About Us</a>
        <a href="location.html">Location</a>
        <a href="support.html">Support</a>
        <a href="login.html">Logout</a>
      </nav>
    </div>
  </header>

  <section class="form-section">
    <h1>Delivery</h1>

    <p class="form-text">
      Order your food here.
      Fill in the form and we will bring your food to your home.
    </p>

    <div class="form-card">
      <form class="nice-form" action="index.html">
        <input type="text" placeholder="Food / product" required>
        <input type="text" placeholder="Street" required>
        <input type="text" placeholder="Postal code" required>
        <input type="text" placeholder="Full name" required>

        <select required>
          <option value="">Payment method</option>
          <option>Cash</option>
          <option>Card</option>
        </select>

        <input type="text" placeholder="Floor" required>
        <button type="submit">Send Order</button>
      </form>
    </div>
  </section>

  <footer>
    <p>Dave's Burger</p>
  </footer>

</body>
</html>
